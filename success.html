<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande confirmée</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="css/style.css">
<script>const SD_API_URL = 'https://admin.swedishcravings.fr';</script>
<script>(function(){try{var w=JSON.parse(localStorage.getItem('sd_wl_v1'));if(w&&w.id){var r=document.documentElement.style;if(w.color_primary){r.setProperty('--heather',w.color_primary);r.setProperty('--heather-mid',w.color_primary+'CC');}if(w.color_secondary){r.setProperty('--lingon',w.color_secondary);r.setProperty('--lingon-mid',w.color_secondary+'CC');}if(w.color_bg)r.setProperty('--cream',w.color_bg);if(w.color_text)r.setProperty('--midnight',w.color_text);}}catch(e){}}());</script>
</head>
<body>
<div id="header-root"></div>

<div class="page-hero" style="background:var(--heather);padding:80px 40px;text-align:center;">
  <div style="font-size:48px;margin-bottom:20px;">✓</div>
  <h1 style="font-family:var(--font-display);font-size:clamp(28px,4vw,52px);font-weight:300;color:var(--snow);">Commande <em style="font-style:italic;color:var(--lingon-mid);">confirmée</em></h1>
  <p style="font-family:var(--font-body);font-size:17px;color:rgba(255,255,255,0.75);margin-top:16px;max-width:480px;margin-left:auto;margin-right:auto;">Merci pour votre commande ! Vous recevrez un email de confirmation dans quelques minutes.</p>
</div>

<div class="section" style="text-align:center;padding:64px 20px;">
  <p style="font-family:var(--font-body);font-size:16px;color:var(--slate);margin-bottom:32px;">Vos articles sont en cours de préparation. Expédition sous 3 à 5 jours ouvrés.</p>
  <a href="boutique.html" class="btn-primary" style="display:inline-block;">Continuer mes achats</a>
</div>

<div id="footer-root"></div>
<script src="js/app.js?v=2"></script>
<script>
initPage('');
// Clear cart after successful payment
localStorage.removeItem('sd_cart');
localStorage.removeItem('sd_cart_products');
cart = {};
updateCartBadge();
</script>
<script src="js/sd-api-client.js?v=2"></script>
<script>window.addEventListener("sdapi:ready",function(){if(typeof updateCartBadge==="function")updateCartBadge();});</script>
</body>
</html>
