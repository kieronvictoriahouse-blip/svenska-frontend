  <div class="page-loading" style="text-align:center;padding:120px 40px;font-family:var(--font-body);font-size:20px;font-style:italic;color:var(--dust);">Chargement…</div>

<script>
initPage('page');
(function() {
  var slug = new URLSearchParams(location.search).get('slug') || '';
  if (!slug) { document.getElementById('page-content').innerHTML = '<div style="text-align:center;padding:120px 40px"><p style="font-size:20px;color:var(--dust)">Page introuvable</p></div>'; return; }

  var BASE = window.SD_API_URL || 'https://svenska-backend.vercel.app';
  fetch(BASE + '/api/pages/' + slug)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var page = data.page;
      if (!page) { document.getElementById('page-content').innerHTML = '<div style="text-align:center;padding:120px 40px"><p style="font-size:20px;color:var(--dust)">Page introuvable</p></div>'; return; }
      var LANG = localStorage.getItem('sd_lang') || 'fr';
      var lk = LANG === 'sv' ? 'sv' : LANG === 'en' ? 'en' : 'fr';

      // Update title
      var titleVal = page['title_' + lk] || page.title_fr || '';
      if (titleVal) document.title = titleVal + ' — ' + (window.SD_WL && window.SD_WL.brand_name ? window.SD_WL.brand_name : 'Swedish Cravings');

      var html = '';

      // Hero
      if (page.hero_image) {
        var heroTitle = page['hero_title_' + lk] || page.hero_title_fr || titleVal;
        var heroSub = page['hero_subtitle_' + lk] || page.hero_subtitle_fr || '';
        html += '<section class="page-hero"><img class="page-hero-img" src="' + page.hero_image + '" alt="' + heroTitle + '"><div class="page-hero-content"><h1>' + heroTitle + '</h1>' + (heroSub ? '<p>' + heroSub + '</p>' : '') + '</div></section>';
      } else {
        var heroTitle2 = page['hero_title_' + lk] || page.hero_title_fr || titleVal;
        html += '<div style="background:var(--heather);padding:60px 40px;text-align:center"><h1 style="font-family:var(--font-display);font-size:clamp(36px,5vw,64px);font-weight:300;color:#fff">' + heroTitle2 + '</h1></div>';
      }

      // Blocks
      var blocks = page.blocks || [];
      blocks.forEach(function(block) {
        if (block.type === 'text') {
          var btitle = block['title_' + lk] || block.title_fr || '';
          var bbody = block['body_' + lk] || block.body_fr || '';
          var bimg = block.image || '';
          var hasImg = !!bimg;
          html += '<div class="page-section' + (hasImg ? ' with-img' : '') + '">';
          html += '<div class="page-section-text">';
          if (btitle) html += '<h2>' + btitle + '</h2>';
          if (bbody) html += '<p>' + bbody.replace(/\n/g, '<br>') + '</p>';
          html += '</div>';
          if (hasImg) html += '<div class="page-section-img"><img src="' + bimg + '" alt="' + btitle + '" loading="lazy"></div>';
          html += '</div>';
        } else if (block.type === 'quote') {
          var qtext = block['text_' + lk] || block.text_fr || '';
          html += '<div class="page-quote"><blockquote>' + qtext + '</blockquote></div>';
        } else if (block.type === 'image') {
          html += '<div class="page-img-block"><figure><img src="' + (block.url||'') + '" alt="' + (block.alt||'') + '" loading="lazy">' + (block.alt ? '<figcaption>' + block.alt + '</figcaption>' : '') + '</figure></div>';
        }
      });

      document.getElementById('page-content').innerHTML = html;
    })
    .catch(function() {
      document.getElementById('page-content').innerHTML = '<div style="text-align:center;padding:120px 40px"><p style="font-size:20px;color:var(--dust)">Erreur de chargement</p></div>';
    });
})();
</script>
