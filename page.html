<style>
/* ── HERO ── */
.pg-hero {
  position: relative;
  height: 64vh;
  min-height: 440px;
  display: flex;
  align-items: flex-end;
  overflow: hidden;
  background: var(--midnight);
}
.pg-hero-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.42;
}
.pg-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(27,33,24,0.88) 0%, rgba(27,33,24,0.15) 55%, transparent 100%);
  pointer-events: none;
}
.pg-hero-no-img {
  height: 36vh;
  min-height: 280px;
  display: flex;
  align-items: center;
  background: var(--heather);
  position: relative;
  overflow: hidden;
}
.pg-hero-no-img::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.04) 0%, transparent 70%);
}
.pg-hero-content {
  position: relative;
  z-index: 2;
  padding: 0 80px 72px;
  max-width: var(--max-width);
  margin: 0 auto;
  width: 100%;
}
.pg-hero-no-img .pg-hero-content {
  padding: 0 80px;
}
.pg-eyebrow {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 3.5px;
  text-transform: uppercase;
  color: var(--lingon-mid);
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.pg-eyebrow::before {
  content: '';
  display: block;
  width: 32px;
  height: 1px;
  background: var(--lingon-mid);
  flex-shrink: 0;
}
.pg-hero h1 {
  font-family: var(--font-display);
  font-size: clamp(42px, 6vw, 92px);
  font-weight: 300;
  color: #fff;
  line-height: 1.0;
  max-width: 780px;
}
.pg-hero-sub {
  font-family: var(--font-body);
  font-size: 18px;
  color: rgba(255,255,255,0.6);
  margin-top: 22px;
  max-width: 520px;
  line-height: 1.65;
}

/* ── BREADCRUMB ── */
.pg-breadcrumb {
  border-bottom: 1px solid var(--linen);
  background: var(--cream);
}
.pg-breadcrumb-inner {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 16px 80px;
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dust);
  display: flex;
  align-items: center;
  gap: 10px;
}
.pg-breadcrumb-inner a { color: var(--heather); transition: color 0.2s; }
.pg-breadcrumb-inner a:hover { color: var(--lingon); }
.pg-breadcrumb-sep { opacity: 0.35; font-size: 9px; }

/* ── TEXT SECTION (no image) ── */
.pg-text {
  max-width: 760px;
  margin: 0 auto;
  padding: 88px 40px;
}
.pg-text + .pg-text {
  padding-top: 0;
}
.pg-section-label {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--lingon);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.pg-section-label::before {
  content: '';
  width: 28px;
  height: 1px;
  background: var(--lingon-mid);
  flex-shrink: 0;
}
.pg-text h2 {
  font-family: var(--font-display);
  font-size: clamp(32px, 3.5vw, 54px);
  font-weight: 300;
  color: var(--midnight);
  line-height: 1.08;
  margin-bottom: 28px;
}
.pg-text p {
  font-family: var(--font-body);
  font-size: 18px;
  color: var(--slate);
  line-height: 2.0;
  white-space: pre-line;
}
.pg-divider {
  width: 48px;
  height: 1px;
  background: var(--linen);
  margin: 28px 0;
}

/* ── SPLIT SECTION (with image) ── */
.pg-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 580px;
  border-top: 1px solid var(--linen);
  border-bottom: 1px solid var(--linen);
}
.pg-split-img {
  overflow: hidden;
  background: var(--parchment);
}
.pg-split-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.6s ease;
}
.pg-split-img:hover img { transform: scale(1.02); }
.pg-split-text {
  padding: 88px 72px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: var(--cream);
}
.pg-split-text h2 {
  font-family: var(--font-display);
  font-size: clamp(28px, 3vw, 48px);
  font-weight: 300;
  color: var(--midnight);
  line-height: 1.1;
  margin-bottom: 24px;
}
.pg-split-text p {
  font-family: var(--font-body);
  font-size: 17px;
  color: var(--slate);
  line-height: 2.0;
  white-space: pre-line;
}
.pg-split.reverse .pg-split-img { order: 1; }
.pg-split.reverse .pg-split-text { order: 0; }

/* ── QUOTE ── */
.pg-quote {
  background: var(--heather-pale);
  padding: 96px 40px;
  text-align: center;
  border-top: 1px solid rgba(61,82,57,0.1);
  border-bottom: 1px solid rgba(61,82,57,0.1);
}
.pg-quote-inner {
  max-width: 800px;
  margin: 0 auto;
  position: relative;
}
.pg-quote-mark {
  font-family: var(--font-display);
  font-size: 140px;
  line-height: 0.6;
  color: var(--heather-light);
  opacity: 0.45;
  display: block;
  margin-bottom: 32px;
  font-style: normal;
}
.pg-quote blockquote {
  font-family: var(--font-display);
  font-size: clamp(24px, 3.2vw, 44px);
  font-style: italic;
  font-weight: 300;
  color: var(--heather);
  line-height: 1.45;
}

/* ── IMAGE BLOCK ── */
.pg-img {
  background: var(--midnight);
  overflow: hidden;
}
.pg-img img {
  width: 100%;
  max-height: 580px;
  object-fit: cover;
  opacity: 0.88;
  display: block;
  transition: opacity 0.4s;
}
.pg-img img:hover { opacity: 1; }
.pg-img figcaption {
  font-family: var(--font-ui);
  font-size: 10px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dust);
  text-align: center;
  padding: 18px 40px;
  background: var(--cream);
  border-bottom: 1px solid var(--linen);
}

/* ── LOADING / ERROR ── */
.pg-state {
  text-align: center;
  padding: 140px 40px;
  font-family: var(--font-body);
  font-size: 20px;
  font-style: italic;
  color: var(--dust);
}

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .pg-hero-content { padding: 0 32px 56px; }
  .pg-hero-no-img .pg-hero-content { padding: 0 32px; }
  .pg-breadcrumb-inner { padding: 14px 32px; }
  .pg-text { padding: 64px 32px; }
  .pg-split { grid-template-columns: 1fr; }
  .pg-split-img { min-height: 340px; order: 0 !important; }
  .pg-split-text { order: 1 !important; padding: 56px 32px; }
  .pg-quote { padding: 72px 32px; }
}
@media (max-width: 640px) {
  .pg-hero-content { padding: 0 20px 40px; }
  .pg-hero-no-img .pg-hero-content { padding: 0 20px; }
  .pg-breadcrumb-inner { padding: 12px 20px; }
  .pg-text { padding: 48px 20px; }
  .pg-split-text { padding: 40px 20px; }
  .pg-quote { padding: 56px 20px; }
}
</style>

<script>
initPage('page');
(function() {
  var slug = new URLSearchParams(location.search).get('slug')
    || location.pathname.replace(/^\//, '').replace(/\.html$/, '')
    || '';
  if (!slug) {
    document.getElementById('page-content').innerHTML = '<div class="pg-state">Page introuvable</div>';
    return;
  }

  var BASE = window.SD_API_URL || 'https://admin.swedishcravings.fr';
  fetch(BASE + '/api/pages/' + slug)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var page = data.page;
      if (!page) {
        document.getElementById('page-content').innerHTML = '<div class="pg-state">Page introuvable</div>';
        return;
      }
      var LANG = localStorage.getItem('sd_lang') || 'fr';
      var lk = LANG === 'sv' ? 'sv' : LANG === 'en' ? 'en' : 'fr';

      var brand = (window.SD_WL && window.SD_WL.brand_name) ? window.SD_WL.brand_name : 'Swedish Cravings';
      var titleVal = page['title_' + lk] || page.title_fr || '';
      if (titleVal) document.title = titleVal + ' — ' + brand;

      var html = '';

      // ── HERO ──
      var heroTitle = page['hero_title_' + lk] || page['hero_title_fr'] || titleVal;
      var heroSub   = page['hero_subtitle_' + lk] || page['hero_subtitle_fr'] || '';

      if (page.hero_image) {
        html += '<section class="pg-hero">';
        html += '<img class="pg-hero-img" src="' + esc(page.hero_image) + '" alt="' + esc(heroTitle) + '">';
        html += '<div class="pg-hero-content">';
        html += '<p class="pg-eyebrow">' + esc(brand) + '</p>';
        html += '<h1>' + heroTitle + '</h1>';
        if (heroSub) html += '<p class="pg-hero-sub">' + esc(heroSub) + '</p>';
        html += '</div></section>';
      } else {
        html += '<div class="pg-hero-no-img">';
        html += '<div class="pg-hero-content">';
        html += '<p class="pg-eyebrow">' + esc(brand) + '</p>';
        html += '<h1 style="color:#fff">' + heroTitle + '</h1>';
        if (heroSub) html += '<p class="pg-hero-sub">' + esc(heroSub) + '</p>';
        html += '</div></div>';
      }

      // ── BREADCRUMB ──
      html += '<nav class="pg-breadcrumb">';
      html += '<div class="pg-breadcrumb-inner">';
      html += '<a href="/">' + (LANG === 'sv' ? 'Hem' : LANG === 'en' ? 'Home' : 'Accueil') + '</a>';
      html += '<span class="pg-breadcrumb-sep">›</span>';
      html += '<span>' + esc(titleVal) + '</span>';
      html += '</div></nav>';

      // ── BLOCKS ──
      var blocks = page.blocks || [];
      var splitIndex = 0;

      blocks.forEach(function(block) {
        if (block.type === 'text') {
          var btitle = block['title_' + lk] || block.title_fr || '';
          var bbody  = block['body_'  + lk] || block.body_fr  || '';
          var bimg   = block.image || '';

          if (bimg) {
            var isReverse = (splitIndex % 2 === 1);
            splitIndex++;
            html += '<section class="pg-split' + (isReverse ? ' reverse' : '') + '">';
            html += '<div class="pg-split-text">';
            if (btitle) html += '<h2>' + esc(btitle) + '</h2>';
            if (btitle) html += '<div class="pg-divider"></div>';
            if (bbody)  html += '<p>' + esc(bbody) + '</p>';
            html += '</div>';
            html += '<div class="pg-split-img"><img src="' + esc(bimg) + '" alt="' + esc(btitle) + '" loading="lazy"></div>';
            html += '</section>';
          } else {
            html += '<div class="pg-text">';
            if (btitle) html += '<h2>' + esc(btitle) + '</h2>';
            if (btitle) html += '<div class="pg-divider"></div>';
            if (bbody)  html += '<p>' + esc(bbody) + '</p>';
            html += '</div>';
          }

        } else if (block.type === 'quote') {
          var qtext = block['text_' + lk] || block.text_fr || '';
          html += '<div class="pg-quote">';
          html += '<div class="pg-quote-inner">';
          html += '<span class="pg-quote-mark">“</span>';
          html += '<blockquote>' + esc(qtext) + '</blockquote>';
          html += '</div></div>';

        } else if (block.type === 'image') {
          var iurl = block.url || '';
          var ialt = block.alt || '';
          html += '<figure class="pg-img">';
          html += '<img src="' + esc(iurl) + '" alt="' + esc(ialt) + '" loading="lazy">';
          if (ialt) html += '<figcaption>' + esc(ialt) + '</figcaption>';
          html += '</figure>';
        }
      });

      document.getElementById('page-content').innerHTML = html;
    })
    .catch(function() {
      document.getElementById('page-content').innerHTML = '<div class="pg-state">Erreur de chargement</div>';
    });

  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
})();
</script>
