name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bake WL + CMS into HTML
        run: node scripts/inject-wl.js
        env:
          SD_API_URL: https://svenska-backend.vercel.app

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: team_l9sgGtvuW983J9KTkTN9bvlU
          VERCEL_PROJECT_ID: prj_pTt9ssFrASKj5FppmOMgv0hDbOi0
