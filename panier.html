<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votre panier</title>
<meta name="description" content="Votre panier.">
<meta name="robots" content="noindex">
<meta property="og:site_name" content="">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="css/style.css">
<script>const SD_API_URL = 'https://admin.swedishcravings.fr';</script>
<script>(function(){try{var w=JSON.parse(localStorage.getItem('sd_wl_v1'));if(w&&w.id){var r=document.documentElement.style;if(w.color_primary){r.setProperty('--heather',w.color_primary);r.setProperty('--heather-mid',w.color_primary+'CC');}if(w.color_secondary){r.setProperty('--lingon',w.color_secondary);r.setProperty('--lingon-mid',w.color_secondary+'CC');}if(w.color_bg)r.setProperty('--cream',w.color_bg);if(w.color_text)r.setProperty('--midnight',w.color_text);if(w.font_display)r.setProperty('--font-display',"'"+w.font_display+"',Georgia,serif");if(w.font_body)r.setProperty('--font-body',"'"+w.font_body+"',Georgia,serif");if(w.font_ui)r.setProperty('--font-ui',"'"+w.font_ui+"',sans-serif");}}catch(e){}}());</script>
<style>
.page-hero{background:var(--heather);padding:64px 40px;text-align:center;}
.page-hero h1{font-family:var(--font-display);font-size:clamp(32px,5vw,64px);font-weight:300;color:var(--snow);}
.page-hero h1 em{font-style:italic;color:var(--lingon-mid);}
.page-hero .hero-crumb{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:18px;}
.page-hero .hero-crumb a{color:rgba(255,255,255,0.55);text-decoration:none;}
.page-hero .hero-crumb a:hover{color:#fff;}

/* Cart layout */
.cart-page-layout{display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:start;}

/* Items list */
.cart-page-items{}
.cart-page-heading{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dust);border-bottom:1px solid var(--linen);padding-bottom:14px;margin-bottom:0;display:grid;grid-template-columns:1fr auto auto;gap:16px;}
.cart-page-row{display:grid;grid-template-columns:88px 1fr auto auto;gap:20px;align-items:center;padding:24px 0;border-bottom:1px solid var(--linen);}
.cpr-img{width:88px;height:88px;border-radius:2px;object-fit:contain;background:var(--warm-white);border:1px solid var(--linen);padding:6px;}
.cpr-info{}
.cpr-name{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--midnight);margin-bottom:4px;}
.cpr-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);}
.cpr-del{background:none;border:none;font-size:12px;color:var(--dust);padding:4px 8px;cursor:pointer;transition:color 0.15s;font-family:var(--font-ui);letter-spacing:1px;}
.cpr-del:hover{color:var(--lingon);}
.cpr-qty{display:flex;align-items:center;gap:0;border:1px solid var(--linen);background:var(--snow);}
.cpr-qty button{background:none;border:none;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--midnight);display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.cpr-qty button:hover{background:var(--linen);}
.cpr-qty span{font-family:var(--font-ui);font-size:13px;width:28px;text-align:center;}
.cpr-price{font-family:var(--font-display);font-size:18px;color:var(--midnight);white-space:nowrap;min-width:60px;text-align:right;}

/* Empty state */
.cart-page-empty{text-align:center;padding:80px 20px;}
.cart-page-empty .empty-icon{color:var(--linen);margin-bottom:24px;}
.cart-page-empty h2{font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--midnight);margin-bottom:12px;}
.cart-page-empty p{font-family:var(--font-body);font-size:17px;color:var(--dust);margin-bottom:32px;}

/* Summary box */
.cart-page-summary{background:var(--snow);border:1px solid var(--linen);padding:32px 28px;position:sticky;top:120px;}
.summary-title{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--midnight);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--linen);}
.summary-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:var(--font-body);font-size:15px;color:var(--slate);}
.summary-line.total{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--midnight);margin-top:16px;padding-top:16px;border-top:1px solid var(--linen);margin-bottom:24px;}
.summary-ship-bar{margin-bottom:20px;}
.summary-ship-text{font-family:var(--font-ui);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dust);margin-bottom:8px;}
.summary-bar{height:3px;background:var(--linen);border-radius:2px;overflow:hidden;}
.summary-bar-fill{height:100%;background:var(--moss);border-radius:2px;transition:width 0.4s ease;}
.btn-pay{width:100%;background:var(--heather);color:var(--snow);border:none;padding:18px 24px;font-family:var(--font-ui);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-bottom:12px;}
.btn-pay:hover{background:var(--midnight);}
.btn-pay-sec{display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-ui);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);margin-bottom:20px;}
.btn-continue{width:100%;background:none;border:1px solid var(--linen);color:var(--slate);padding:14px 24px;font-family:var(--font-ui);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-continue:hover{border-color:var(--heather);color:var(--heather);}
.pay-methods{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.pay-m{font-family:var(--font-ui);font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--linen);padding:4px 8px;color:var(--dust);}

@media(max-width:1024px){
  .cart-page-layout{grid-template-columns:1fr;gap:32px;}
  .cart-page-summary{position:static;}
  .page-hero{padding:48px 20px;}
}
@media(max-width:600px){
  .cart-page-row{grid-template-columns:68px 1fr;gap:14px;}
  .cpr-qty,.cpr-price{grid-column:2;}
  .cpr-del{grid-column:2;justify-self:end;}
}
</style>
</head>
<body>
<div id="header-root"></div>

<div class="page-hero">
  <p class="hero-crumb"><a href="index.html" data-sv="Hem" data-fr="Accueil" data-en="Home">Accueil</a> / <span data-sv="Korg" data-fr="Panier" data-en="Cart">Panier</span></p>
  <h1 data-sv="Din <em>korg</em>" data-fr="Votre <em>panier</em>" data-en="Your <em>cart</em>">Votre <em>panier</em></h1>
</div>

<div class="section">
  <div id="cart-page-root"></div>
</div>

<div id="footer-root"></div>
<script src="js/app.js?v=2"></script>
<script>
initPage('');
renderCartPageFull();

function renderCartPageFull() {
  const root = document.getElementById('cart-page-root');
  if (!root) return;
  const entries = Object.entries(cart).filter(([,q]) => q > 0);

  if (entries.length === 0) {
    root.innerHTML = `
      <div class="cart-page-empty">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 6h8l6 32h28l6-24H18"/><circle cx="26" cy="52" r="3"/><circle cx="42" cy="52" r="3"/>
          </svg>
        </div>
        <h2 data-sv="Din korg är tom" data-fr="Votre panier est vide" data-en="Your cart is empty">${UI[LANG].emptyCart}</h2>
        <p data-sv="Upptäck våra produkter och lägg till dina favoriter." data-fr="Découvrez nos produits et ajoutez vos favoris." data-en="Discover our products and add your favourites.">${LANG==='sv'?'Upptäck våra produkter och lägg till dina favoriter.':LANG==='en'?'Discover our products and add your favourites.':'Découvrez nos produits et ajoutez vos favoris.'}</p>
        <a href="boutique.html" class="btn-primary">${LANG==='sv'?'Utforska butiken':LANG==='en'?'Explore the shop':'Explorer la boutique'}</a>
      </div>`;
    return;
  }

  let subtotal = 0;
  const itemRows = entries.map(([key, qty]) => {
    const _ri = key.indexOf('_');
    const idStr = _ri === -1 ? key : key.slice(0, _ri);
    const variant = _ri === -1 ? undefined : key.slice(_ri + 1);
    const _cpd = JSON.parse(localStorage.getItem('sd_cart_products') || '{}');
    const p = PRODUCTS.find(x => String(x.uuid || x.id) === idStr || x.id === parseInt(idStr)) || _cpd[idStr] || (window._SD_STATIC||[]).find(x => String(x.id) === idStr);
    if (!p) return '';
    const v = variant ? p.variants?.find(x => x.label === variant) : p.variants?.[0];
    const price = v ? v.price : p.price;
    const line = price * qty;
    subtotal += line;
    return `
      <div class="cart-page-row">
        <img class="cpr-img" src="${p.photo || ''}" alt="${p.name?.[LANG] || p.name?.fr || ''}" onerror="this.style.display='none'">
        <div class="cpr-info">
          <div class="cpr-name">${p.name?.[LANG] || p.name?.fr || ''}</div>
          <div class="cpr-sub">${variant || p.weight || ''}</div>
          <div style="margin-top:10px;">
            <button class="cpr-del" onclick="removeItem('${key}');renderCartPageFull();" data-sv="Ta bort" data-fr="Supprimer" data-en="Remove">${LANG==='sv'?'Ta bort':LANG==='en'?'Remove':'Supprimer'}</button>
          </div>
        </div>
        <div class="cpr-qty">
          <button onclick="changeQty('${key}',-1);renderCartPageFull();">−</button>
          <span>${qty}</span>
          <button onclick="changeQty('${key}',1);renderCartPageFull();">+</button>
        </div>
        <div class="cpr-price">€${line.toFixed(2)}</div>
      </div>`;
  }).join('');

  const remaining = 50 - subtotal;
  const pct = Math.min(100, (subtotal / 50) * 100);
  const shipHtml = remaining > 0
    ? `<div class="summary-ship-bar">
        <div class="summary-ship-text">${LANG==='sv'?`€${remaining.toFixed(2)} kvar till fri frakt`:LANG==='en'?`€${remaining.toFixed(2)} away from free delivery`:`Plus que €${remaining.toFixed(2)} pour la livraison gratuite`}</div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width:${pct}%"></div></div>
       </div>`
    : `<div class="summary-ship-bar">
        <div class="summary-ship-text" style="color:var(--moss);">${UI[LANG].freeShip} ✓</div>
       </div>`;

  const shipping = subtotal >= 50 ? 0 : 4.90;

  root.innerHTML = `
    <div class="cart-page-layout">
      <div class="cart-page-items">
        <div class="cart-page-heading">
          <span data-sv="Produkt" data-fr="Produit" data-en="Product">${LANG==='sv'?'Produkt':LANG==='en'?'Product':'Produit'}</span>
          <span data-sv="Antal" data-fr="Quantité" data-en="Qty">${LANG==='sv'?'Antal':LANG==='en'?'Qty':'Quantité'}</span>
          <span data-sv="Pris" data-fr="Prix" data-en="Price">${LANG==='sv'?'Pris':LANG==='en'?'Price':'Prix'}</span>
        </div>
        ${itemRows}
        <div style="margin-top:24px;">
          <a href="boutique.html" style="font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:color 0.15s;" onmouseover="this.style.color='var(--heather)'" onmouseout="this.style.color='var(--dust)'">
            ← ${LANG==='sv'?'Fortsätt handla':LANG==='en'?'Continue shopping':'Continuer mes achats'}
          </a>
        </div>
      </div>

      <div class="cart-page-summary">
        <div class="summary-title" data-sv="Orderöversikt" data-fr="Récapitulatif" data-en="Order summary">${LANG==='sv'?'Orderöversikt':LANG==='en'?'Order summary':'Récapitulatif'}</div>
        <div class="summary-line">
          <span data-sv="Delsumma" data-fr="Sous-total" data-en="Subtotal">${UI[LANG].subtotal}</span>
          <span>€${subtotal.toFixed(2)}</span>
        </div>
        <div class="summary-line">
          <span data-sv="Leverans" data-fr="Livraison" data-en="Shipping">${LANG==='sv'?'Leverans':LANG==='en'?'Shipping':'Livraison'}</span>
          <span>${shipping === 0 ? `<span style="color:var(--moss)">${LANG==='sv'?'Gratis':LANG==='en'?'Free':'Gratuite'}</span>` : `€${shipping.toFixed(2)}`}</span>
        </div>
        ${shipHtml}
        <div class="summary-line total">
          <span>Total</span>
          <span>€${(subtotal + shipping).toFixed(2)}</span>
        </div>
        <button class="btn-pay" onclick="doSnipcartCheckout()">
          ${LANG==='sv'?'Betala säkert →':LANG==='en'?'Pay securely →':'Payer en toute sécurité →'}
        </button>
        <div class="btn-pay-sec">
          <svg width="10" height="12" viewBox="0 0 10 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="5" width="8" height="6" rx="1"/><path d="M3 5V3.5a2 2 0 0 1 4 0V5"/></svg>
          <span>${LANG==='sv'?'Säker betalning via Stripe':LANG==='en'?'Secure payment via Stripe':'Paiement sécurisé via Stripe'}</span>
        </div>
        <div class="pay-methods">
          <span class="pay-m">VISA</span>
          <span class="pay-m">MASTERCARD</span>
          <span class="pay-m">PAYPAL</span>
        </div>
      </div>
    </div>`;
}

async function doSnipcartCheckout() {
  const items = Object.entries(cart)
    .filter(([,q]) => q > 0)
    .map(([key, qty]) => {
      const ri = key.indexOf('_');
      const idStr = ri === -1 ? key : key.slice(0, ri);
      const variant = ri === -1 ? undefined : key.slice(ri + 1);
      // Upgrade integer IDs to UUIDs when API products are available
      const idInt = parseInt(idStr);
      let id = idStr;
      if (!isNaN(idInt) && /^\d+$/.test(idStr)) {
        const p = PRODUCTS.find(x => x.id === idInt || String(x.id) === idStr);
        if (p && p.uuid) id = p.uuid;
      }
      return Object.assign({ id, quantity: qty }, variant ? { variant } : {});
    });
  if (items.length === 0) return;
  const btn = document.querySelector('.btn-pay');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res = await fetch((window.SD_API_URL || 'https://admin.swedishcravings.fr') + '/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert('Erreur lors du paiement. Veuillez réessayer.');
      if (btn) { btn.disabled = false; btn.textContent = LANG === 'sv' ? 'Betala säkert →' : LANG === 'en' ? 'Pay securely →' : 'Payer en toute sécurité →'; }
    }
  } catch(e) {
    console.error('[checkout]', e);
    alert('Erreur de connexion. Veuillez réessayer.');
    if (btn) { btn.disabled = false; btn.textContent = LANG === 'sv' ? 'Betala säkert →' : LANG === 'en' ? 'Pay securely →' : 'Payer en toute sécurité →'; }
  }
}

// Re-render when API products load (handles timing with PRODUCTS array)
window.addEventListener('sdapi:ready', () => { renderCartPageFull(); });
</script>
<script src="js/sd-api-client.js?v=2"></script>
</body>
</html>
