<script>(function(){try{var w=JSON.parse(localStorage.getItem('sd_wl_v1'));if(w&&w.id){var r=document.documentElement.style;if(w.color_primary){r.setProperty('--heather',w.color_primary);r.setProperty('--heather-mid',w.color_primary+'CC');}if(w.color_secondary){r.setProperty('--lingon',w.color_secondary);r.setProperty('--lingon-mid',w.color_secondary+'CC');}if(w.color_bg)r.setProperty('--cream',w.color_bg);if(w.color_text)r.setProperty('--midnight',w.color_text);if(w.font_display)r.setProperty('--font-display',"'"+w.font_display+"',Georgia,serif");if(w.font_body)r.setProperty('--font-body',"'"+w.font_body+"',Georgia,serif");if(w.font_ui)r.setProperty('--font-ui',"'"+w.font_ui+"',sans-serif");}}catch(e){}}());</script>
<style>
.page-hero{background:var(--heather);padding:64px 40px;text-align:center;}
.page-hero h1{font-family:var(--font-display);font-size:clamp(32px,5vw,64px);font-weight:300;color:var(--snow);}
.page-hero h1 em{font-style:italic;color:var(--lingon-mid);}
.page-hero .hero-crumb{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:18px;}
.page-hero .hero-crumb a{color:rgba(255,255,255,0.55);text-decoration:none;}
.page-hero .hero-crumb a:hover{color:#fff;}

/* Cart layout */
.cart-page-layout{display:grid;grid-template-columns:1fr 360px;gap:48px;align-items:start;}

/* Items list */
.cart-page-items{}
.cart-page-heading{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--dust);border-bottom:1px solid var(--linen);padding-bottom:14px;margin-bottom:0;display:grid;grid-template-columns:1fr auto auto;gap:16px;}
.cart-page-row{display:grid;grid-template-columns:88px 1fr auto auto;gap:20px;align-items:center;padding:24px 0;border-bottom:1px solid var(--linen);}
.cpr-img{width:88px;height:88px;border-radius:2px;object-fit:contain;background:var(--warm-white);border:1px solid var(--linen);padding:6px;}
.cpr-info{}
.cpr-name{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--midnight);margin-bottom:4px;}
.cpr-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);}
.cpr-del{background:none;border:none;font-size:12px;color:var(--dust);padding:4px 8px;cursor:pointer;transition:color 0.15s;font-family:var(--font-ui);letter-spacing:1px;}
.cpr-del:hover{color:var(--lingon);}
.cpr-qty{display:flex;align-items:center;gap:0;border:1px solid var(--linen);background:var(--snow);}
.cpr-qty button{background:none;border:none;width:32px;height:32px;font-size:16px;cursor:pointer;color:var(--midnight);display:flex;align-items:center;justify-content:center;transition:background 0.15s;}
.cpr-qty button:hover{background:var(--linen);}
.cpr-qty span{font-family:var(--font-ui);font-size:13px;width:28px;text-align:center;}
.cpr-price{font-family:var(--font-display);font-size:18px;color:var(--midnight);white-space:nowrap;min-width:60px;text-align:right;}

/* Empty state */
.cart-page-empty{text-align:center;padding:80px 20px;}
.cart-page-empty .empty-icon{color:var(--linen);margin-bottom:24px;}
.cart-page-empty h2{font-family:var(--font-display);font-size:32px;font-weight:300;color:var(--midnight);margin-bottom:12px;}
.cart-page-empty p{font-family:var(--font-body);font-size:17px;color:var(--dust);margin-bottom:32px;}

/* Summary box */
.cart-page-summary{background:var(--snow);border:1px solid var(--linen);padding:32px 28px;position:sticky;top:120px;}
/* Delivery toggle */
.delivery-toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--linen);border-radius:4px;overflow:hidden;margin-bottom:20px;}
.dt-btn{background:var(--snow);border:none;padding:10px 6px;font-family:var(--font-ui);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--slate);cursor:pointer;transition:background 0.15s,color 0.15s;text-align:center;line-height:1.4;}
.dt-btn.active{background:var(--heather);color:var(--snow);}
.dt-btn:not(:last-child){border-right:1px solid var(--linen);}
.summary-title{font-family:var(--font-display);font-size:20px;font-weight:500;color:var(--midnight);margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--linen);}
.summary-line{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:var(--font-body);font-size:15px;color:var(--slate);}
.summary-line.total{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--midnight);margin-top:16px;padding-top:16px;border-top:1px solid var(--linen);margin-bottom:24px;}
.summary-ship-bar{margin-bottom:20px;}
.summary-ship-text{font-family:var(--font-ui);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dust);margin-bottom:8px;}
.summary-bar{height:3px;background:var(--linen);border-radius:2px;overflow:hidden;}
.summary-bar-fill{height:100%;background:var(--moss);border-radius:2px;transition:width 0.4s ease;}
.btn-pay{width:100%;background:var(--heather);color:var(--snow);border:none;padding:18px 24px;font-family:var(--font-ui);font-size:12px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-bottom:12px;}
.btn-pay:hover{background:var(--midnight);}
.btn-pay-sec{display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--font-ui);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);margin-bottom:20px;}
.btn-continue{width:100%;background:none;border:1px solid var(--linen);color:var(--slate);padding:14px 24px;font-family:var(--font-ui);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:border-color 0.2s,color 0.2s;}
.btn-continue:hover{border-color:var(--heather);color:var(--heather);}
.pay-methods{display:flex;gap:6px;justify-content:center;margin-top:20px;flex-wrap:wrap;}
.pay-m{font-family:var(--font-ui);font-size:9px;letter-spacing:1px;text-transform:uppercase;border:1px solid var(--linen);padding:4px 8px;color:var(--dust);}

@media(max-width:1024px){
  .cart-page-layout{grid-template-columns:1fr;gap:32px;}
  .cart-page-summary{position:static;}
  .page-hero{padding:48px 20px;}
}
@media(max-width:600px){
  .cart-page-row{grid-template-columns:68px 1fr;gap:14px;}
  .cpr-qty,.cpr-price{grid-column:2;}
  .cpr-del{grid-column:2;justify-self:end;}
}
/* Profile gate modal */
.pg-field{margin-bottom:18px;}
.pg-field label{display:block;font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dust);margin-bottom:7px;}
.pg-field input,.pg-field select{width:100%;border:1px solid var(--linen);background:var(--cream);padding:12px 14px;font-family:var(--font-body);font-size:15px;color:var(--midnight);outline:none;transition:border-color 0.2s;box-sizing:border-box;}
.pg-field input:focus,.pg-field select:focus{border-color:var(--heather);}
.pg-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:480px){.pg-2col{grid-template-columns:1fr;}}
.promo-section{margin-bottom:20px;}
.promo-row{display:flex;gap:8px;margin-bottom:8px;}
.promo-input{flex:1;border:1px solid var(--linen);background:var(--cream);padding:10px 12px;font-family:var(--font-body);font-size:14px;color:var(--midnight);outline:none;box-sizing:border-box;transition:border-color 0.2s;}
.promo-input:focus{border-color:var(--heather);}
.promo-btn{background:none;border:1px solid var(--heather);color:var(--heather);padding:10px 14px;font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:background 0.2s,color 0.2s;}
.promo-btn:hover{background:var(--heather);color:var(--snow);}
.promo-msg{font-family:var(--font-ui);font-size:11px;letter-spacing:0.5px;min-height:16px;}
.promo-msg.ok{color:var(--moss);}
.promo-msg.err{color:var(--lingon);}
.relay-picker{margin-bottom:20px;}
.relay-search-row{display:flex;gap:8px;margin-bottom:10px;}
.relay-cp-input{flex:1;border:1px solid var(--linen);background:var(--cream);padding:10px 12px;font-family:var(--font-body);font-size:14px;color:var(--midnight);outline:none;box-sizing:border-box;transition:border-color 0.2s;}
.relay-cp-input:focus{border-color:var(--heather);}
.relay-search-btn{background:none;border:1px solid var(--heather);color:var(--heather);padding:10px 14px;font-family:var(--font-ui);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:background 0.2s,color 0.2s;}
.relay-search-btn:hover{background:var(--heather);color:var(--snow);}
.relay-list{max-height:200px;overflow-y:auto;border:1px solid var(--linen);margin-bottom:8px;}
.relay-item{padding:10px 12px;border-bottom:1px solid var(--linen);cursor:pointer;transition:background 0.15s;}
.relay-item:last-child{border-bottom:none;}
.relay-item:hover,.relay-item.selected{background:var(--linen);}
.relay-item.selected{border-left:3px solid var(--heather);padding-left:9px;}
.relay-item-name{font-family:var(--font-ui);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--midnight);margin-bottom:2px;}
.relay-item-addr{font-family:var(--font-body);font-size:12px;color:var(--dust);}
.relay-selected-info{font-family:var(--font-ui);font-size:11px;color:var(--midnight);background:var(--linen);padding:8px 12px;margin-bottom:8px;}
</style>
</head>
<body>
<div id="header-root"></div>

<div class="page-hero">
  <p class="hero-crumb"><a href="index.html" data-sv="Hem" data-fr="Accueil" data-en="Home">Accueil</a> / <span data-sv="Korg" data-fr="Panier" data-en="Cart">Panier</span></p>
  <h1 data-sv="Din <em>korg</em>" data-fr="Votre <em>panier</em>" data-en="Your <em>cart</em>">Votre <em>panier</em></h1>
</div>

<div class="section">
  <div id="cart-page-root"></div>
</div>

<!-- Profile completion gate — shown when user has no name/address before checkout -->
<div id="profile-gate" style="display:none;position:fixed;inset:0;background:rgba(27,33,24,0.65);z-index:2000;align-items:center;justify-content:center;padding:20px;">
  <div style="background:var(--snow);max-width:460px;width:100%;padding:40px 36px;position:relative;max-height:90vh;overflow-y:auto;">
    <button onclick="document.getElementById('profile-gate').style.display='none'" style="position:absolute;top:16px;right:16px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--dust);line-height:1;" aria-label="Fermer">×</button>
    <h2 style="font-family:var(--font-display);font-size:22px;font-weight:500;color:var(--midnight);margin-bottom:8px;">Avant de commander</h2>
    <p style="font-family:var(--font-body);font-size:15px;color:var(--dust);margin-bottom:28px;line-height:1.6;" id="profile-gate-subtitle"></p>
    <div id="profile-gate-fields"></div>
    <button id="profile-gate-btn" onclick="submitProfileGate()" style="width:100%;background:var(--heather);color:var(--snow);border:none;padding:16px 24px;font-family:var(--font-ui);font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:4px;transition:background 0.2s;" onmouseover="this.style.background='var(--midnight)'" onmouseout="this.style.background='var(--heather)'">
      CONTINUER →
    </button>
    <div id="profile-gate-error" style="color:var(--lingon);font-family:var(--font-ui);font-size:12px;margin-top:10px;min-height:18px;"></div>
  </div>
</div>
<div id="footer-root"></div>
<script src="js/app.js?v=6"></script>
<script>
window._deliveryMode = window._deliveryMode || 'pickup';
window._selectedRelay = window._selectedRelay || null;
window._relayPoints = window._relayPoints || null;
window._relaySearchCp = window._relaySearchCp || '';
window._relayCountry = window._relayCountry || 'FR';
window._relayCarrierName = window._relayCarrierName || '';
window._relayPriceTE = window._relayPriceTE ?? null;
function setDeliveryMode(mode) {
  window._deliveryMode = mode;
  if (mode !== 'mondial_relay') { window._selectedRelay = null; window._relayPoints = null; window._relaySearchCp = ''; window._relayCountry = 'FR'; window._relayCarrierName = ''; window._relayPriceTE = null; }
}

initPage('');
renderCartPageFull();

function renderCartPageFull() {
  const root = document.getElementById('cart-page-root');
  if (!root) return;
  const entries = Object.entries(cart).filter(([,q]) => q > 0);

  if (entries.length === 0) {
    root.innerHTML = `
      <div class="cart-page-empty">
        <div class="empty-icon">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 6h8l6 32h28l6-24H18"/><circle cx="26" cy="52" r="3"/><circle cx="42" cy="52" r="3"/>
          </svg>
        </div>
        <h2 data-sv="Din korg är tom" data-fr="Votre panier est vide" data-en="Your cart is empty">${UI[LANG].emptyCart}</h2>
        <p data-sv="Upptäck våra produkter och lägg till dina favoriter." data-fr="Découvrez nos produits et ajoutez vos favoris." data-en="Discover our products and add your favourites.">${LANG==='sv'?'Upptäck våra produkter och lägg till dina favoriter.':LANG==='en'?'Discover our products and add your favourites.':'Découvrez nos produits et ajoutez vos favoris.'}</p>
        <a href="boutique.html" class="btn-primary">${LANG==='sv'?'Utforska butiken':LANG==='en'?'Explore the shop':'Explorer la boutique'}</a>
      </div>`;
    return;
  }

  let subtotal = 0;
  const itemRows = entries.map(([key, qty]) => {
    const _ri = key.indexOf('_');
    const idStr = _ri === -1 ? key : key.slice(0, _ri);
    const variant = _ri === -1 ? undefined : key.slice(_ri + 1);
    const _cpd = JSON.parse(localStorage.getItem('sd_cart_products') || '{}');
    const p = PRODUCTS.find(x => String(x.uuid || x.id) === idStr || x.id === parseInt(idStr)) || _cpd[idStr] || (window._SD_STATIC||[]).find(x => String(x.id) === idStr);
    if (!p) return '';
    const v = variant ? p.variants?.find(x => x.label === variant) : p.variants?.[0];
    const price = v ? v.price : p.price;
    const line = price * qty;
    subtotal += line;
    return `
      <div class="cart-page-row">
        <img class="cpr-img" src="${p.photo || ''}" alt="${p.name?.[LANG] || p.name?.fr || ''}" onerror="this.style.display='none'">
        <div class="cpr-info">
          <div class="cpr-name">${p.name?.[LANG] || p.name?.fr || ''}</div>
          <div class="cpr-sub">${variant || p.weight || ''}</div>
          <div style="margin-top:10px;">
            <button class="cpr-del" onclick="removeItem('${key}');renderCartPageFull();" data-sv="Ta bort" data-fr="Supprimer" data-en="Remove">${LANG==='sv'?'Ta bort':LANG==='en'?'Remove':'Supprimer'}</button>
          </div>
        </div>
        <div class="cpr-qty">
          <button onclick="changeQty('${key}',-1);renderCartPageFull();">−</button>
          <span>${qty}</span>
          <button onclick="changeQty('${key}',1);renderCartPageFull();">+</button>
        </div>
        <div class="cpr-price">${fmtPrice(line)}</div>
      </div>`;
  }).join('');

  const INTL_COUNTRIES = ['ES','PT','IT','DE','NL','BE','LU','CH'];
  const isIntl = INTL_COUNTRIES.includes(window._relayCountry || 'FR');
  const freeThreshold = isIntl ? 70 : 50;
  const baseShipping  = isIntl ? 9.90 : 4.90;

  const remaining = freeThreshold - subtotal;
  const pct = Math.min(100, (subtotal / freeThreshold) * 100);
  const shipHtml = remaining > 0
    ? `<div class="summary-ship-bar">
        <div class="summary-ship-text">${LANG==='sv'?`${fmtPrice(remaining)} kvar till fri frakt`:LANG==='en'?`${fmtPrice(remaining)} away from free delivery`:`Plus que ${fmtPrice(remaining)} pour la livraison gratuite`}</div>
        <div class="summary-bar"><div class="summary-bar-fill" style="width:${pct}%"></div></div>
       </div>`
    : `<div class="summary-ship-bar">
        <div class="summary-ship-text" style="color:var(--moss);">${UI[LANG].freeShip} ✓</div>
       </div>`;

  const shipping = subtotal >= freeThreshold ? 0 : baseShipping;
  const _promoValid = !!(window._appliedPromo && subtotal >= (window._appliedPromo.min_order || 0));
  const _discountAmt = _promoValid ? _calcPromoDiscount(window._appliedPromo, subtotal) : 0;
  const _isFreeShip = _promoValid && window._appliedPromo.type === 'free_shipping';
  const _effectiveShipping = (_isFreeShip || window._deliveryMode === 'pickup') ? 0 : shipping;
  const _totalToPay = Math.max(0, subtotal - _discountAmt) + _effectiveShipping;
  const _promoLabel = LANG==='sv'?'Kampanjkod':LANG==='en'?'Promo code':'Code promo';
  const _promoApplyLabel = LANG==='sv'?'Tillämpa':LANG==='en'?'Apply':'Appliquer';
  const _promoInputVal = window._appliedPromo?.code || window._promoInput || '';
  const _promoMinFail = !!(window._appliedPromo && !_promoValid);
  const _promoMsgToShow = _promoMinFail ? { ok: false, text: `${LANG==='en'?'Minimum order':LANG==='sv'?'Minsta order':'Commande minimum'} ${fmtPrice(window._appliedPromo.min_order)} ${LANG==='en'?'required':'requise'}` } : window._promoMsg;
  const _promoMsgHtml = _promoMsgToShow ? `<div class="promo-msg ${_promoMsgToShow.ok?'ok':'err'}">${_promoMsgToShow.text}</div>` : '';
  const _promoDiscHtml = (_promoValid && _discountAmt > 0) ? `<div class="summary-line" style="color:var(--moss)"><span>${LANG==='sv'?'Rabatt':LANG==='en'?'Discount':'Réduction'} (${window._appliedPromo.code})</span><span>−${fmtPrice(_discountAmt)}</span></div>` : ((_promoValid && _isFreeShip) ? `<div class="summary-line" style="color:var(--moss)"><span>Code ${window._appliedPromo.code}</span><span>${LANG==='sv'?'Fri frakt':LANG==='en'?'Free shipping':'Livraison offerte'}</span></div>` : '');

  const relayPickerHtml = window._deliveryMode === 'mondial_relay' ? (function() {
    const L = LANG || 'fr';
    let listHtml = '';
    if (window._relayPoints === 'loading') {
      listHtml = '<div style="font-family:var(--font-ui);font-size:11px;color:var(--dust);padding:8px 0;">...</div>';
    } else if (Array.isArray(window._relayPoints)) {
      if (window._relayPoints.length === 0) {
        listHtml = '<div style="font-family:var(--font-ui);font-size:11px;color:var(--dust);padding:8px 0;">'+(L==='en'?'No relay points found':L==='sv'?'Inga utlämningsställen hittades':'Aucun point relais trouvé')+'</div>';
      } else {
        listHtml = '<div class="relay-list">' + window._relayPoints.map(function(p,i){
          return '<div class="relay-item'+(window._selectedRelay&&window._selectedRelay.id===p.id?' selected':'')+'" onclick="selectRelay('+i+')">'
            +'<div class="relay-item-name">'+p.name+'</div>'
            +'<div class="relay-item-addr">'+p.adresse+', '+p.cp+' '+p.ville+(p.distance?' — '+p.distance+' km':'')+'</div>'
            +'</div>';
        }).join('') + '</div>';
      }
    }
    const selectedHtml = window._selectedRelay
      ? '<div class="relay-selected-info">✓ '+window._selectedRelay.name+' — '+window._selectedRelay.adresse+', '+window._selectedRelay.cp+' '+window._selectedRelay.ville+(window._selectedRelay.carrier_name?' ('+window._selectedRelay.carrier_name+')':'')+'</div>'
      : '';
    const cpPlaceholder = L==='sv'?'Postnummer':L==='en'?'Postal code':'Code postal';
    const searchTxt = L==='sv'?'Sök':L==='en'?'Search':'Chercher';
    const countries = [
      {code:'FR', label:'France'},
      {code:'ES', label:'Espagne'},
      {code:'PT', label:'Portugal'},
      {code:'BE', label:'Belgique'},
      {code:'LU', label:'Luxembourg'},
      {code:'NL', label:'Pays-Bas'},
      {code:'DE', label:'Allemagne'},
      {code:'IT', label:'Italie'},
      {code:'CH', label:'Suisse'},
    ];
    const countrySelect = '<select id="relay-country-select" style="border:1px solid var(--linen);background:var(--cream);padding:10px 12px;font-family:var(--font-ui);font-size:13px;color:var(--midnight);outline:none;cursor:pointer;" onchange="window._relayCountry=this.value;window._relayPoints=null;window._selectedRelay=null;window._relaySearchCp=\'\';renderCartPageFull();">'
      + countries.map(c => '<option value="'+c.code+'"'+(window._relayCountry===c.code?' selected':'')+'>'+c.label+'</option>').join('')
      + '</select>';
    const carrierBadge = '';
    return '<div class="relay-picker">'
      +'<div class="relay-search-row" style="flex-wrap:wrap;gap:6px;">'
      + countrySelect
      +'<input id="relay-cp-input" class="relay-cp-input" type="text" placeholder="'+cpPlaceholder+'" value="'+(window._relaySearchCp||'')+'" oninput="window._relaySearchCp=this.value" onkeydown="if(event.key===\'Enter\')searchRelayPoints(this.value)">'
      +'<button class="relay-search-btn" onclick="searchRelayPoints(document.getElementById(\'relay-cp-input\')?.value||\'\')">'+ searchTxt+'</button>'
      +'</div>'
      + carrierBadge
      +listHtml
      +selectedHtml

  })() : '';

  root.innerHTML = `

            📦 ${LANG==='sv'?'Utlämning':LANG==='en'?'Relay point':'Point Relais'}

        <div class="promo-section">

function _calcPromoDiscount(promo, sub) {
  if (!promo) return 0;
  if (promo.type === 'percent') return Math.min(sub, (sub * promo.value) / 100);
  if (promo.type === 'fixed') return Math.min(sub, promo.value);
  return 0;
}

async function applyPromoCode() {
  const code = ((document.getElementById('promo-input')?.value || '') || window._promoInput || '').trim().toUpperCase();
  if (!code) return;
  const BASE = window.SD_API_URL || 'https://admin.swedishcravings.fr';
  try {
    const res = await fetch(BASE + '/api/marketing?tab=promo');
    if (!res.ok) throw new Error('fetch failed');
    const { codes } = await res.json();
    const found = (codes || []).find(c => c.code === code);
    const L = LANG || 'fr';
    if (!found || !found.is_active) {
      window._appliedPromo = null; window._promoInput = code;
      window._promoMsg = { ok: false, text: L==='en'?'Invalid or inactive code':L==='sv'?'Ogiltig kod':'Code invalide ou inactif' };
      renderCartPageFull(); return;
    }
    const now = new Date();
    if (found.valid_from && now < new Date(found.valid_from)) {
      window._appliedPromo = null; window._promoInput = code;
      window._promoMsg = { ok: false, text: L==='en'?'Code not yet valid':L==='sv'?'Koden är inte giltig ännu':'Code pas encore valide' };
      renderCartPageFull(); return;
    }
    if (found.valid_until && now > new Date(found.valid_until)) {
      window._appliedPromo = null; window._promoInput = code;
      window._promoMsg = { ok: false, text: L==='en'?'Code expired':L==='sv'?'Koden har gått ut':'Code expiré' };
      renderCartPageFull(); return;
    }
    if (found.max_uses && (found.used_count || 0) >= found.max_uses) {
      window._appliedPromo = null; window._promoInput = code;
      window._promoMsg = { ok: false, text: L==='en'?'Code no longer available':L==='sv'?'Koden är inte längre tillgänglig':'Code plus disponible' };
      renderCartPageFull(); return;
    }
    const entries = Object.entries(cart).filter(([,q]) => q > 0);
    let st = 0;
    entries.forEach(([key, qty]) => {
      const ri = key.indexOf('_'); const idStr = ri===-1?key:key.slice(0,ri);
      const _cpd = JSON.parse(localStorage.getItem('sd_cart_products')||'{}');
      const p = PRODUCTS.find(x => String(x.uuid||x.id)===idStr||x.id===parseInt(idStr))||_cpd[idStr]||(window._SD_STATIC||[]).find(x=>String(x.id)===idStr);
      if (!p) return;
      const variant = ri===-1?undefined:key.slice(ri+1);
      const v = variant?p.variants?.find(x=>x.label===variant):p.variants?.[0];
      st += (v?v.price:p.price) * qty;
    });
    if (found.min_order && st < found.min_order) {
      window._appliedPromo = null; window._promoInput = code;
      window._promoMsg = { ok: false, text: `${L==='en'?'Minimum order':L==='sv'?'Minsta order':'Commande minimum'} ${fmtPrice(found.min_order)} ${L==='en'?'required':'requise'}` };
      renderCartPageFull(); return;
    }
    window._appliedPromo = found; window._promoInput = code;
    const discAmt = _calcPromoDiscount(found, st);
    const discLabel = found.type==='free_shipping'
      ? (L==='en'?'Free shipping applied!':L==='sv'?'Fri frakt aktiverad!':'Livraison offerte appliquée !')
      : `${L==='en'?'Discount':L==='sv'?'Rabatt':'Réduction'} −${fmtPrice(discAmt)} ${L==='en'?'applied!':L==='sv'?'tillämpas!':'appliquée !'}`;
    window._promoMsg = { ok: true, text: discLabel };
    renderCartPageFull();
  } catch(e) {
    window._promoMsg = { ok: false, text: LANG==='en'?'Error. Try again.':'Erreur. Réessayez.' };
    renderCartPageFull();
  }
}

async function searchRelayPoints(cp) {
  if (!cp || cp.trim().length < 4) return;
  window._relaySearchCp = cp.trim();
  window._relayPoints = 'loading';
  window._selectedRelay = null;
  renderCartPageFull();
  const BASE = window.SD_API_URL || 'https://admin.swedishcravings.fr';
  const pays = window._relayCountry || 'FR';
  try {
    // Tous les pays : Mondial Relay SOAP + LogSpher (Chronopost) en parallèle
    var fetchPromises = [
      fetch(BASE + '/api/mondial-relay/points?cp=' + encodeURIComponent(cp.trim()) + '&pays=' + encodeURIComponent(pays)).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){ return d ? (Array.isArray(d) ? d : (d.points||[])) : []; }),
      fetch(BASE + '/api/logspher/relay-points?cp=' + encodeURIComponent(cp.trim()) + '&country=' + encodeURIComponent(pays)).then(function(r){ return r.ok ? r.json() : null; }).then(function(d){ return d ? (d.points||[]) : []; })
    ];

    var results = await Promise.allSettled(fetchPromises);
    var mrPoints = (results[0].status === 'fulfilled' ? results[0].value : []).map(function(p){ return Object.assign({}, p, { carrier_name: p.carrier_name || 'Mondial Relay' }); });
    var lsPoints = results[1].status === 'fulfilled' ? results[1].value : [];
    var seen = new Set(mrPoints.map(function(p){ return p.id; }));
    window._relayPoints = mrPoints.concat(lsPoints.filter(function(p){ return !seen.has(p.id); }));
    window._relayCarrierName = '';
    window._relayPriceTE = null;
  } catch(e) {
    window._relayPoints = [];
  }
  renderCartPageFull();
}

function selectRelay(i) {
  window._selectedRelay = (window._relayPoints || [])[i] || null;
  renderCartPageFull();
}

async function doCheckout() {
  // 1. Auth check — must be logged in
  let session;
  try { session = JSON.parse(localStorage.getItem('sd_customer_v1') || 'null'); } catch(e) {}
  if (!session?.token) {
    window.location.href = 'compte.html?next=checkout';
    return;
  }

  // 2. Build item list
  const items = Object.entries(cart)
    .filter(([,q]) => q > 0)
    .map(([key, qty]) => {
      const ri = key.indexOf('_');
      const idStr = ri === -1 ? key : key.slice(0, ri);
      const variant = ri === -1 ? undefined : key.slice(ri + 1);
      const idInt = parseInt(idStr);
      let id = idStr;
      if (!isNaN(idInt) && /^\d+$/.test(idStr)) {
        const p = PRODUCTS.find(x => x.id === idInt || String(x.id) === idStr);
        if (p && p.uuid) id = p.uuid;
      }
      return Object.assign({ id, quantity: qty }, variant ? { variant } : {});
    });
  if (items.length === 0) return;

  const isPickup = window._deliveryMode === 'pickup';
  const isMR = window._deliveryMode === 'mondial_relay';
  const BASE = window.SD_API_URL || 'https://admin.swedishcravings.fr';

  if (isMR && !window._selectedRelay) {
    alert(LANG === 'en' ? 'Please select a relay point.' : LANG === 'sv' ? 'Välj ett utlämningsställe.' : 'Veuillez sélectionner un point relais.');
    return;
  }

  // 3. Profile check — require name (+ address for home delivery only)
  let profile = null;
  try {
    const pr = await fetch(BASE + '/api/customer/profile', { headers: { Authorization: 'Bearer ' + session.token } });
    if (pr.ok) profile = (await pr.json()).profile || null;
  } catch(e) {}

  const profileOk = (isPickup || isMR)
    ? !!(profile?.name)
    : !!(profile?.name && profile?.address1 && profile?.city && profile?.postal_code);

  if (!profileOk) {
    showProfileGate(session.token, isPickup || isMR, () => doCheckout());
    return;
  }

  // 4. Proceed to Stripe checkout
  const btn = document.querySelector('.btn-pay');
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const res = await fetch(BASE + '/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        items,
        delivery_mode: window._deliveryMode || 'delivery',
        customer_token: session.token,
        customer_email: session.customer_email,
        promo_code: window._appliedPromo?.code || null,
        customer_note: (window._orderNote || '').trim() || null,
        ...(window._deliveryMode === 'mondial_relay' && window._selectedRelay ? {
          relay_point_id: window._selectedRelay.id,
          relay_point_name: window._selectedRelay.name,
          relay_point_address: window._selectedRelay.adresse + ', ' + window._selectedRelay.cp + ' ' + window._selectedRelay.ville,
          relay_point_pays: window._selectedRelay.pays || window._relayCountry || 'FR',
          relay_carrier_uuid: window._selectedRelay.carrier_uuid || null,
        } : {}),
      }),
    });
    const data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      alert('Erreur lors du paiement. Veuillez réessayer.');
      if (btn) { btn.disabled = false; btn.textContent = LANG === 'sv' ? 'Betala säkert →' : LANG === 'en' ? 'Pay securely →' : 'Payer en toute sécurité →'; }
    }
  } catch(e) {
    console.error('[checkout]', e);
    alert('Erreur de connexion. Veuillez réessayer.');
    if (btn) { btn.disabled = false; btn.textContent = LANG === 'sv' ? 'Betala säkert →' : LANG === 'en' ? 'Pay securely →' : 'Payer en toute sécurité →'; }
  }
}

function showProfileGate(token, isPickup, onSaved) {
  const gate = document.getElementById('profile-gate');
  if (!gate) return;
  const L = LANG || 'fr';
  const _isMRMode = window._deliveryMode === 'mondial_relay';
  const subtitles = {
    fr: isPickup ? (_isMRMode ? 'Indiquez votre nom pour commander en point relais Mondial Relay.' : 'Indiquez votre nom pour finaliser la commande (click & collect).') : 'Renseignez vos coordonnées de livraison pour continuer.',
    en: isPickup ? (_isMRMode ? 'Enter your name to order to a Mondial Relay point.' : 'Enter your name to complete your order (click & collect).') : 'Enter your delivery address to continue.',
    sv: isPickup ? (_isMRMode ? 'Ange ditt namn för att beställa till ett utlämningsställe.' : 'Ange ditt namn för att slutföra beställningen.') : 'Ange din leveransadress för att fortsätta.',
  };
  document.getElementById('profile-gate-subtitle').textContent = subtitles[L] || subtitles.fr;
  const addrFields = isPickup ? '' : `
    <div class="pg-field"><label>${L==='sv'?'Adresse':L==='en'?'Address':'Adresse'}</label><input id="pg-addr1" type="text" autocomplete="street-address" placeholder="15 rue de la Paix"></div>
    <div class="pg-field pg-2col">
      <div class="pg-field" style="margin-bottom:0"><label>${L==='sv'?'Stad':L==='en'?'City':'Ville'}</label><input id="pg-city" type="text" autocomplete="address-level2" placeholder="Paris"></div>
      <div class="pg-field" style="margin-bottom:0"><label>${L==='sv'?'Code postal':L==='en'?'Postal code':'Code postal'}</label><input id="pg-postal" type="text" autocomplete="postal-code" placeholder="75001"></div>
    </div>
    <div class="pg-field"><label>${L==='sv'?'Land':L==='en'?'Country':'Pays'}</label><select id="pg-country" autocomplete="country">
      <option value="FR">France</option><option value="BE">Belgique</option><option value="CH">Suisse</option>
      <option value="LU">Luxembourg</option><option value="DE">Allemagne</option><option value="ES">Espagne</option>
      <option value="IT">Italie</option><option value="NL">Pays-Bas</option><option value="PT">Portugal</option>
      <option value="SE">Suède</option><option value="GB">Royaume-Uni</option>
    </select></div>`;
  document.getElementById('profile-gate-fields').innerHTML = `
    <div class="pg-field"><label>${L==='sv'?'Nom complet':L==='en'?'Full name':'Nom complet'} *</label><input id="pg-name" type="text" autocomplete="name" placeholder="${L==='sv'?'Prénom Nom':L==='en'?'First Last':'Prénom Nom'}"></div>
    <div class="pg-field"><label>${L==='sv'?'Telefon':L==='en'?'Phone':'Téléphone'}</label><input id="pg-phone" type="tel" autocomplete="tel" placeholder="+33 6 12 34 56 78"></div>
    ${addrFields}`;
  gate._token = token; gate._isPickup = isPickup; gate._onSaved = onSaved;
  gate.style.display = 'flex';
  setTimeout(() => document.getElementById('pg-name')?.focus(), 50);
}

async function submitProfileGate() {
  const gate = document.getElementById('profile-gate');
  const { _token, _isPickup, _onSaved } = gate;
  const btn = document.getElementById('profile-gate-btn');
  const errEl = document.getElementById('profile-gate-error');
  const L = LANG || 'fr';
  const name    = (document.getElementById('pg-name')?.value || '').trim();
  const phone   = (document.getElementById('pg-phone')?.value || '').trim();
  const address1 = _isPickup ? '' : (document.getElementById('pg-addr1')?.value || '').trim();
  const city     = _isPickup ? '' : (document.getElementById('pg-city')?.value || '').trim();
  const postal_code = _isPickup ? '' : (document.getElementById('pg-postal')?.value || '').trim();
  const country  = _isPickup ? 'FR' : (document.getElementById('pg-country')?.value || 'FR');
  if (!name) { errEl.textContent = L==='en'?'Name is required.':L==='sv'?'Namn krävs.':'Le nom est obligatoire.'; return; }
  if (!_isPickup && (!address1 || !city || !postal_code)) { errEl.textContent = L==='en'?'Please fill in all address fields.':L==='sv'?'Fyll i alla adressfält.':"Veuillez remplir tous les champs d'adresse."; return; }
  errEl.textContent = '';
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  const BASE = window.SD_API_URL || 'https://admin.swedishcravings.fr';
  try {
    const res = await fetch(BASE + '/api/customer/profile', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + _token },
      body: JSON.stringify({ name, phone, address1, address2: '', city, postal_code, country }),
    });
    if (!res.ok) { errEl.textContent = L==='en'?'Error, please retry.':'Erreur, réessayez.'; if(btn){btn.disabled=false;btn.textContent='CONTINUER →';} return; }
    gate.style.display = 'none';
    if (_onSaved) _onSaved();
  } catch(e) {
    errEl.textContent = L==='en'?'Connection error.':'Erreur de connexion.';
    if (btn) { btn.disabled = false; btn.textContent = 'CONTINUER →'; }
  }
}
