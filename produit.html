<style>
.breadcrumb { max-width:var(--max-width); margin:0 auto; padding:18px 40px; display:flex; align-items:center; gap:8px; font-family:var(--font-ui); font-size:11px; letter-spacing:1px; text-transform:uppercase; }
.breadcrumb a { color:var(--dust); transition:color 0.2s; }
.breadcrumb a:hover { color:var(--lingon); }
.breadcrumb span { color:var(--linen); }
.breadcrumb strong { color:var(--slate); font-weight:500; }

.pdp { max-width:var(--max-width); margin:0 auto; padding:0 40px 80px; display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:start; }

/* GALLERY */
.gallery { position:sticky; top:100px; }
.gallery-main { aspect-ratio:1; background:linear-gradient(135deg,var(--parchment) 0%,var(--cream) 100%); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; border:1px solid var(--linen); margin-bottom:10px; cursor:zoom-in; }
.gallery-main-emoji { font-size:140px; line-height:1; position:relative; z-index:1; transition:transform 0.35s; }
.gallery-main:hover .gallery-main-emoji { transform:scale(1.06); }
.gallery-origin { position:absolute; top:16px; right:16px; background:var(--heather); color:var(--snow); font-family:var(--font-ui); font-size:9px; letter-spacing:2px; text-transform:uppercase; padding:6px 14px; border-radius:1px; }
.gallery-thumbs { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.g-thumb { aspect-ratio:1; background:var(--cream); border:1px solid var(--linen); display:flex; align-items:center; justify-content:center; font-size:26px; cursor:pointer; transition:border-color 0.2s; }
.g-thumb.active, .g-thumb:hover { border-color:var(--lingon); }

/* INFO */
.pdp-info {}
.pdp-cat { font-family:var(--font-ui); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--lingon-mid); margin-bottom:10px; }
.pdp-name { font-family:var(--font-display); font-size:clamp(30px,4vw,54px); font-weight:300; color:var(--heather); line-height:1.06; margin-bottom:6px; }
.pdp-name em { font-style:italic; }
.pdp-sub { font-family:var(--font-body); font-size:18px; font-style:italic; color:var(--dust); margin-bottom:18px; }
.pdp-rating { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
.pdp-stars { color:var(--lingon-mid); font-size:15px; letter-spacing:2px; }
.pdp-rev { font-family:var(--font-ui); font-size:11px; color:var(--dust); letter-spacing:1px; }

.price-row { display:flex; align-items:baseline; gap:14px; padding:18px 0; border-top:1px solid var(--parchment); border-bottom:1px solid var(--parchment); margin-bottom:22px; }
.pdp-price { font-family:var(--font-display); font-size:42px; font-weight:300; color:var(--midnight); }
.pdp-per { font-family:var(--font-ui); font-size:12px; color:var(--dust); letter-spacing:1px; text-transform:uppercase; }
.pdp-per-kg { font-family:var(--font-ui); font-size:11px; color:var(--birch); letter-spacing:1px; }

.pdp-desc { font-family:var(--font-body); font-size:17px; color:var(--slate); line-height:1.9; margin-bottom:26px; }

.opt-label { font-family:var(--font-ui); font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--dust); margin-bottom:10px; }
.variants { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:26px; }
.var-btn { padding:9px 18px; border:1px solid var(--linen); background:none; font-family:var(--font-body); font-size:15px; color:var(--slate); border-radius:1px; transition:all 0.2s; }
.var-btn:hover, .var-btn.active { background:var(--heather); border-color:var(--heather); color:var(--snow); }

.add-row { display:flex; gap:10px; align-items:center; margin-bottom:26px; }
.qty-ctrl { display:flex; align-items:center; border:1px solid var(--linen); background:var(--warm-white); }
.qty-ctrl button { background:none; border:none; width:42px; height:50px; font-size:20px; display:flex; align-items:center; justify-content:center; color:var(--slate); transition:background 0.15s; }
.qty-ctrl button:hover { background:var(--parchment); }
.qty-ctrl span { padding:0 14px; font-family:var(--font-display); font-size:19px; min-width:44px; text-align:center; }
.btn-add { flex:1; background:var(--heather); color:var(--snow); border:none; height:50px; font-family:var(--font-ui); font-size:11px; letter-spacing:2.5px; text-transform:uppercase; border-radius:1px; transition:background 0.2s; }
.btn-add:hover { background:var(--heather-mid); }
.btn-wish { width:50px; height:50px; border:1px solid var(--linen); background:none; font-size:20px; color:var(--linen); display:flex; align-items:center; justify-content:center; border-radius:1px; transition:all 0.2s; }
.btn-wish:hover, .btn-wish.liked { color:var(--lingon); border-color:var(--lingon); }

.pdp-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:28px; }
.pdp-pill { background:var(--heather-pale); color:var(--heather); font-family:var(--font-ui); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:5px 14px; border-radius:1px; }
.pdp-pill.copper-pill { background:var(--lingon-pale); color:var(--lingon-deep); }

/* SHARE / TRUST */
.pdp-trust { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:24px; padding:16px 0; border-top:1px solid var(--parchment); }
.trust-badge { display:flex; align-items:center; gap:6px; font-family:var(--font-ui); font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--dust); }

/* ACCORDION */
.accordion { border-top:1px solid var(--parchment); }
.acc-item { border-bottom:1px solid var(--parchment); }
.acc-trigger { width:100%; background:none; border:none; padding:16px 0; display:flex; justify-content:space-between; align-items:center; font-family:var(--font-ui); font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:var(--slate); transition:color 0.2s; }
.acc-trigger:hover { color:var(--lingon); }
.acc-arrow { transition:transform 0.22s; font-size:10px; }
.acc-trigger.open .acc-arrow { transform:rotate(180deg); }
.acc-body { max-height:0; overflow:hidden; transition:max-height 0.35s ease; }
.acc-body.open { max-height:500px; }
.acc-content { font-family:var(--font-body); font-size:16px; color:var(--slate); line-height:1.85; padding:0 0 20px; }

/* RELATED */
.related-bg { background:var(--cream); border-top:1px solid var(--linen); }

@media(max-width:1024px) {
  .pdp { grid-template-columns:1fr; gap:36px; }
  .gallery { position:static; }
  .breadcrumb { padding:14px 20px; }
  .pdp { padding:0 20px 60px; }
}
@media(max-width:600px) {
  .pdp { padding:0 16px 48px; gap:24px; }
  .pdp-name { font-size:28px; }
  .pdp-price { font-size:32px; }
  .add-row { flex-wrap:wrap; }
  .btn-add { min-width:100%; }
  .gallery-thumbs { grid-template-columns:repeat(4,1fr); }
  .breadcrumb { font-size:10px; gap:4px; padding:10px 16px; }
}

<script>
let pdpQtyVal = 1;
let selectedVariant = null;
let isWished = false;
let pdpProduct = null;

initPage('shop');

function onLangChange() { if (pdpProduct) renderPDP(pdpProduct); }

function renderPDP(p) {
  pdpProduct = p;
  document.title = p.name[LANG] + ' — Heather & Lingon';
  document.getElementById('bc-name').textContent = p.name[LANG];
  // Afficher photo ou emoji
  const mainPhoto = document.getElementById('main-photo');
  const mainEmoji = document.getElementById('main-emoji');
  if (p.photo) {
    mainEmoji.style.display = 'none';
    mainPhoto.style.display = 'block';
    mainPhoto.alt = p.name[LANG];
    mainPhoto.src = p.photo;
    // Fallback si l'image ne charge pas
    mainPhoto.onerror = function() {
      mainPhoto.style.display = 'none';
      mainEmoji.style.display = 'block';
      mainEmoji.textContent = p.emoji || '🇸🇪';
    };
  } else {
    mainPhoto.style.display = 'none';
    mainEmoji.style.display = 'block';
    mainEmoji.textContent = p.emoji || '🇸🇪';
  }
  document.getElementById('pdp-cat').textContent = CAT_LABELS[p.cat]?.[LANG] || p.cat;
  document.getElementById('pdp-name').textContent = p.name[LANG];
  document.getElementById('pdp-sub').textContent = p.subtitle[LANG];
  document.getElementById('pdp-desc').textContent = p.desc[LANG];

  // Rating
  const stars = '★'.repeat(Math.round(p.rating)) + '☆'.repeat(5-Math.round(p.rating));
  document.getElementById('pdp-stars').textContent = stars;
  document.getElementById('pdp-rev').textContent = `${p.rating} (${p.reviews} ${LANG==='sv'?'recensioner':LANG==='en'?'reviews':'avis'})`;

  // Price
  selectedVariant = p.variants[0];
  updatePrice();

  // Variants
  const vb = document.getElementById('variants-block');
  const vl = document.getElementById('variants-list');
  if (p.variants.length > 1) {
    vb.style.display = 'block';
    vl.innerHTML = p.variants.map((v,i) => `
      <button class="var-btn${i===0?' active':''}" onclick="selectVar(this,'${v.label}',${v.price})">${v.label} — €${v.price.toFixed(2)}</button>
    `).join('');
  } else {
    vb.style.display = 'none';
  }

  // Pills
  document.getElementById('pdp-pills').innerHTML =
    p.tags.map(t=>`<span class="pdp-pill">${t}</span>`).join('') +
    (p.badge ? `<span class="pdp-pill copper-pill">${getBadgeLabel(p.badge)}</span>` : '');

  // Thumbs
  const thumbEmojis = ['📦', '🌿', '🏷️'];
  const firstThumb = p.photo
    ? `<div class="g-thumb active" onclick="selectThumbPhoto(this,'${p.photo}')"><img src="${p.photo}" style="width:100%;height:100%;object-fit:cover;border-radius:4px"></div>`
    : `<div class="g-thumb active" onclick="selectThumb(this,'${p.emoji}',true,'${p.emoji}')"><span>${p.emoji}</span></div>`;
  document.getElementById('gallery-thumbs').innerHTML = firstThumb + thumbEmojis.map((e,i) => `
    <div class="g-thumb" onclick="selectThumb(this,'${e}',false,'${p.emoji}')">
      <span>${e}</span>
    </div>`).join('');

  // Accordion
  const sections = [
    { key:'usage',       sv:'Användning',        fr:'Utilisation',        en:'Usage' },
    { key:'ingredients', sv:'Ingredienser',       fr:'Ingrédients',        en:'Ingredients' },
    { key:'storage',     sv:'Förvaring',          fr:'Conservation',       en:'Storage' },
  ];
  document.getElementById('accordion').innerHTML = sections
    .filter(s => p[s.key]?.[LANG])
    .map((s,i) => `
      <div class="acc-item">
        <button class="acc-trigger${i===0?' open':''}" onclick="toggleAcc(this)">
          <span>${LANG==='sv'?s.sv:LANG==='en'?s.en:s.fr}</span>
          <span class="acc-arrow">▾</span>
        </button>
        <div class="acc-body${i===0?' open':''}">
          <div class="acc-content">${p[s.key][LANG]}</div>
        </div>
      </div>`).join('');

  // Related
  const related = PRODUCTS.filter(x => x.cat === p.cat && x.id !== p.id).slice(0,4);
  document.getElementById('related-grid').innerHTML = related.map(r => productCardHTML(r)).join('');

  // Reset qty
  pdpQtyVal = 1;
  document.getElementById('pdp-qty').textContent = 1;
  document.getElementById('btn-wish').textContent = isWished ? '♥' : '♡';

  // Sticky ATC
  const price = selectedVariant ? selectedVariant.price : p.price;
  initStickyAtc(p.name[LANG], price);

  // Open Graph + JSON-LD dynamiques
  const ogTitle = document.getElementById('og-title');
  const ogDesc = document.getElementById('og-desc');
  const ogImg = document.getElementById('og-image');
  const ldProd = document.getElementById('ld-product');
  if (ogTitle) ogTitle.content = p.name[LANG] + ' — Heather & Lingon';
  if (ogDesc && p.desc[LANG]) ogDesc.content = p.desc[LANG].slice(0,160);
  if (ogImg && p.photo) ogImg.content = p.photo;
  if (ldProd) ldProd.textContent = JSON.stringify({
    '@context': 'https://schema.org', '@type': 'Product',
    name: p.name[LANG], description: p.desc[LANG],
    image: p.photo, brand: { '@type': 'Brand', name: 'Heather & Lingon' },
    offers: { '@type': 'Offer', price: price, priceCurrency: 'EUR', availability: 'https://schema.org/InStock' }
  });

  // Reveal sections
  initScrollReveal();
}

function updatePrice() {
  if (!selectedVariant) return;
  document.getElementById('pdp-price').textContent = '€' + selectedVariant.price.toFixed(2);
  document.getElementById('pdp-per').textContent = selectedVariant.label;
}

function selectVar(btn, label, price) {
  document.querySelectorAll('.var-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedVariant = { label, price };
  updatePrice();
}

function selectThumbPhoto(el) {
  document.querySelectorAll('.g-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('main-photo').style.display = 'block';
  document.getElementById('main-emoji').style.display = 'none';
}

function selectThumb(el, emoji, isMain, mainEmoji) {
  document.querySelectorAll('.g-thumb').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  if (isMain && document.getElementById('main-photo').src) {
    document.getElementById('main-photo').style.display = 'block';
    document.getElementById('main-emoji').style.display = 'none';
  } else {
    document.getElementById('main-photo').style.display = 'none';
    document.getElementById('main-emoji').style.display = 'block';
    document.getElementById('main-emoji').textContent = emoji;
  }
}

function changeQtyPdp(d) {
  pdpQtyVal = Math.max(1, pdpQtyVal + d);
  document.getElementById('pdp-qty').textContent = pdpQtyVal;
}

function pdpAdd() {
  if (!pdpProduct) return;
  addToCart(pdpProduct.id, pdpQtyVal, selectedVariant?.label);
  openCart();
}

function toggleWish() {
  isWished = !isWished;
  const b = document.getElementById('btn-wish');
  b.textContent = isWished ? '♥' : '♡';
  b.classList.toggle('liked', isWished);
}

function toggleAcc(trigger) {
  trigger.classList.toggle('open');
  trigger.nextElementSibling.classList.toggle('open');
}

// Load product — appel direct API par UUID ou sort_order
(async function() {
  const _rawId = new URLSearchParams(window.location.search).get('id');
  const _numId = parseInt(_rawId);
  const _isUUID = _rawId && _rawId.includes('-');
  
  // Appel direct à l'API sans passer par PRODUCTS
  const BASE = 'https://svenska-backend.vercel.app';
  const CAT_EMOJI = {'Épices':'🌶️','Flocons & Céréales':'🌾','Baies séchées':'🫐','Sucres & Sirops':'🍯','Thés & Tisanes':'🫖','Farines & Graines':'🌻','Mélanges':'🎄','Chips & Snacks':'🍟','Basics suédois':'🇸🇪','Confiseries':'🍬','Fika & Boulangerie':'🧁'};
  
  try {
    const url = _isUUID 
      ? `${BASE}/api/products/${_rawId}` 
      : `${BASE}/api/products?sort_order=${_numId}`;
    const res = await fetch(url);
    const data = await res.json();
    const raw = _isUUID ? (data.product || data) : (Array.isArray(data) ? data[0] : (data.products || [])[0]);
    
    if (raw) {
      const resolveCat = (p) => {
        const n = (p.name_fr || '').toLowerCase();
        if (n.includes('chips')||n.includes('olw')) return 'Chips & Snacks';
        if (n.includes('daim')||n.includes('bilar')||n.includes('fish')||n.includes('lakrits')||n.includes('skipper')) return 'Confiseries';
        if (n.includes('kanelbulle')||n.includes('semla')||n.includes('chokladboll')||n.includes('vaniljsocker')) return 'Fika & Boulangerie';
        if (n.includes('kanel')||n.includes('kardemumma')||n.includes('glögg')||n.includes('dill')||n.includes('peppar')||n.includes('santa maria')||n.includes('allkrydda')) return 'Épices';
        if (n.includes('lingon')||n.includes('fläder')||n.includes('nypon')) return 'Baies séchées';
        if (n.includes('skogste')||n.includes('sureau')) return 'Thés & Tisanes';
        if (n.includes('pärlsocker')||n.includes('sirap')) return 'Sucres & Sirops';
        if (n.includes('havregryn')||n.includes('müsli')) return 'Flocons & Céréales';
        if (n.includes('mjöl')||n.includes('vallmo')) return 'Farines & Graines';
        if (n.includes('lussekatt')||n.includes('midsommar')) return 'Mélanges';
        if (n.includes('wasa')||n.includes('kaviar')||n.includes('kavring')||n.includes('lingonsylt')) return 'Basics suédois';
        return 'Épices';
      };
      const cat = resolveCat(raw);
      // Fallback : données hardcodées si champs absents en DB
      const local = (window.PRODUCTS || []).find(p => p.id === _numId || p.id === raw.sort_order);
      const fb = (apiVal, localVal) => apiVal || localVal || '';
      const fbObj = (svKey, frKey, enKey, localField) => ({
        sv: raw[svKey] || local?.[localField]?.sv || '',
        fr: raw[frKey] || local?.[localField]?.fr || '',
        en: raw[enKey] || local?.[localField]?.en || '',
      });
      const product = {
        id: raw.sort_order || _numId, cat, emoji: CAT_EMOJI[cat] || '🛒',
        badge: raw.badge || '', rating: raw.rating || 4.5, reviews: raw.reviews_count || 0,
        photo: raw.image_url || local?.photo || '',
        name:        fbObj('name_sv',        'name_fr',        'name_en',        'name'),
        subtitle:    fbObj('subtitle_sv',    'subtitle_fr',    'subtitle_en',    'subtitle'),
        origin:      fbObj('origin_sv',      'origin_fr',      'origin_en',      'origin'),
        desc:        fbObj('desc_sv',        'desc_fr',        'desc_en',        'desc'),
        usage:       fbObj('usage_sv',       'usage_fr',       'usage_en',       'usage'),
        ingredients: fbObj('ingredients_sv', 'ingredients_fr', 'ingredients_en', 'ingredients'),
        storage:     fbObj('storage_sv',     'storage_fr',     'storage_en',     'storage'),
        price: raw.price, weight: raw.weight || local?.weight || '', tags: raw.tags || local?.tags || [],
        variants: (raw.product_variants || []).map(v => ({ label: v.label, price: v.price })) || local?.variants || [],
        bestseller: raw.is_bestseller || false, isNew: raw.is_new || false,
      };
      renderPDP(product);
      return;
    }
  } catch(e) {
    console.warn('[PDP] API failed, fallback statique:', e.message);
  }
  
  // Fallback statique
  const product = PRODUCTS.find(p => p.id === _numId);
  if (product) renderPDP(product);
  else document.getElementById('pdp-layout').innerHTML = '<div style="grid-column:span 2;text-align:center;padding:80px 20px;font-style:italic;color:var(--dust);">Produit introuvable. <a href="boutique.html" style="color:var(--lingon);">Retour à la boutique →</a></div>';
})();

// Si la fiche est déjà rendue avec le fallback statique, re-render avec données Supabase
window.addEventListener('sdapi:ready', () => {
  if (!pdpProduct && window.PRODUCTS && window.PRODUCTS.length > 0) {
    const _rawId = new URLSearchParams(window.location.search).get('id');
    const _numId = parseInt(_rawId);
    const found = window.PRODUCTS.find(p => p.id === _numId);
    if (found) renderPDP(found);
  }
  if (pdpProduct && pdpProduct.photo) {
    const mainPhoto = document.getElementById('main-photo');
    const mainEmoji = document.getElementById('main-emoji');
    if (mainPhoto && mainEmoji && !mainPhoto.src) {
      mainEmoji.style.display = 'none';
      mainPhoto.style.display = 'block';
      mainPhoto.src = pdpProduct.photo;
      mainPhoto.onerror = () => { mainPhoto.style.display = 'none'; mainEmoji.style.display = 'block'; };
    }
  }
});
</script>
